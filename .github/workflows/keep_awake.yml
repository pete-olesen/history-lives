name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake up History Lives with real browser
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print('Visiting site...')
              page.goto('https://history-lives-pete.streamlit.app', timeout=60000, wait_until='networkidle')
              print('Page loaded, waiting for app to fully wake...')
              time.sleep(10)
              # Click the wake-up button if it exists
              try:
                  button = page.get_by_text('Yes, get this app back up')
                  if button.is_visible(timeout=3000):
                      print('Found wake button, clicking...')
                      button.click()
                      time.sleep(15)
              except Exception as e:
                  print('No wake button found (app may already be awake):', e)
              print('Final page title:', page.title())
              browser.close()
              print('Done')
          "
